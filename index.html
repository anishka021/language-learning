<!---index.html-->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LearnEasy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="user-info">
    <div class="user-name">👤 <span id="userName">Loading...</span></div>
    <div class="user-stats">
        <span>⭐ <span id="totalPoints">0</span> points</span>
        <span>📚 <span id="quizzesDone">0</span> quizzes</span>
        <div class="logout-btn" id="logoutBtn">🚪 Logout</div>
    </div>
</div>

<header>
    <h1>LearnEasy</h1>
</header>

<section class="hero">
    <h2>Learn Languages Easily 🚀</h2>
</section>

<!-- SIDE BY SIDE LAYOUT -->
<div class="main-content">
    <!-- LEFT SIDE: Progress Overview -->
    <div class="progress-overview">
        <h3>📊 Your Learning Progress</h3>
        <div class="lang-progress" id="langProgress"></div>
        <div class="total-points" id="totalPointsDisplay"></div>
    </div>

    <!-- RIGHT SIDE: Language Cards -->
    <div class="languages-section">
        <h3>🌐 Choose a Language</h3>
        <div class="languages">
            <div class="card" onclick="openLevel('english')">
                <img src="https://wallpapercave.com/wp/R3WmyID.jpg">
                <h3>English </h3>
            </div>
            <div class="card" onclick="openLevel('spanish')">
                <img src="https://tse3.mm.bing.net/th/id/OIP.dAwzhzqtbaSExZuea05SlQHaFS?pid=Api&h=220&P=0">
                <h3>Spanish </h3>
            </div>
            <div class="card" onclick="openLevel('french')">
                <img src="https://tse2.mm.bing.net/th/id/OIP.adYGjfEwLEmp8jU8cgT_LwHaFj?pid=Api&h=220&P=0">
                <h3>French </h3>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script type="module">
import { auth, db } from "./firebase.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

document.getElementById("logoutBtn").onclick = async () => {
    await signOut(auth);
    window.location.href = "login.html";
};

function updateProgressCircle(element, percentage) {
    const angle = (percentage / 100) * 360;
    element.style.background = `conic-gradient(#4CAF50 ${angle}deg, #ddd ${angle}deg)`;
}

async function loadUserProgress(userId) {
    const userDoc = await getDoc(doc(db, "users", userId));
    if (userDoc.exists()) {
        const data = userDoc.data();
        document.getElementById("userName").textContent = data.name || "Learner";
        document.getElementById("totalPoints").textContent = data.totalPoints || 0;
        document.getElementById("quizzesDone").textContent = data.quizzesCompleted || 0;
        
        const progress = data.progress || {};
        const langProgressDiv = document.getElementById("langProgress");
        langProgressDiv.innerHTML = "";
        
        const languages = ["english", "spanish", "french"];
        const langNames = { english: "English", spanish: "Spanish", french: "French" };
        const langFlags = { english: "🇬🇧", spanish: "🇪🇸", french: "🇫🇷" };
        
        languages.forEach(lang => {
            const langData = progress[lang] || { basic: false, intermediate: false, advanced: false };
            const completedLevels = Object.values(langData).filter(v => v === true).length;
            const percentage = (completedLevels / 3) * 100;
            
            const item = document.createElement("div");
            item.className = "lang-progress-item";
            item.innerHTML = `
                <h4>${langFlags[lang]} ${langNames[lang]}</h4>
                <div class="lang-progress-circle" id="circle-${lang}">
                    <span>${Math.round(percentage)}%</span>
                </div>
                <div class="level-badges">
                    <div class="level-badge ${langData.basic ? 'completed' : 'pending'}">Basic</div>
                    <div class="level-badge ${langData.intermediate ? 'completed' : 'pending'}">Inter</div>
                    <div class="level-badge ${langData.advanced ? 'completed' : 'pending'}">Adv</div>
                </div>
            `;
            langProgressDiv.appendChild(item);
            updateProgressCircle(document.getElementById(`circle-${lang}`), percentage);
        });
        
        document.getElementById("totalPointsDisplay").innerHTML = `🏆 Total Points: ${data.totalPoints || 0} ⭐`;
    }
}

onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "login.html";
    } else {
        await loadUserProgress(user.uid);
    }
});
</script>
</body>
</html>
