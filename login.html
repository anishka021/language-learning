<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnEasy - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <h1>🌍 LearnEasy</h1>
            <div class="subtitle">Your Language Learning Companion</div>
            
            <div class="info-box">
                ✅ No email verification required!<br>
                Sign up and login instantly.
            </div>
            
            <div id="loginForm">
                <input type="email" id="loginEmail" class="auth-input" placeholder="Email Address">
                <input type="password" id="loginPassword" class="auth-input" placeholder="Password">
                <div id="loginError" class="error-msg"></div>
                <button class="auth-btn" id="loginBtn">Login 🚀</button>
                <div class="toggle-text">
                    Don't have an account? 
                    <span class="toggle-link" id="showSignupBtn">Sign Up</span>
                </div>
            </div>

            <div id="signupForm" style="display: none;">
                <input type="text" id="signupName" class="auth-input" placeholder="Full Name">
                <input type="email" id="signupEmail" class="auth-input" placeholder="Email Address">
                <input type="password" id="signupPassword" class="auth-input" placeholder="Password (min 6 characters)">
                <input type="password" id="signupConfirmPassword" class="auth-input" placeholder="Confirm Password">
                <div id="signupError" class="error-msg"></div>
                <div id="signupSuccess" class="success-msg"></div>
                <button class="auth-btn" id="signupBtn">Create Account ✨</button>
                <div class="toggle-text">
                    Already have an account? 
                    <span class="toggle-link" id="showLoginBtn">Login</span>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyCtJ8yMj8NdJYp85HPmc1FDRG-_T-n4T74",
            authDomain: "language-learning-917eb.firebaseapp.com",
            projectId: "language-learning-917eb",
            storageBucket: "language-learning-917eb.firebasestorage.app",
            messagingSenderId: "123554534908",
            appId: "1:123554534908:web:b204c429b11fb1167e8e79"
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Toggle Forms
        document.getElementById("showSignupBtn").onclick = () => {
            document.getElementById("loginForm").style.display = "none";
            document.getElementById("signupForm").style.display = "block";
        };
        document.getElementById("showLoginBtn").onclick = () => {
            document.getElementById("signupForm").style.display = "none";
            document.getElementById("loginForm").style.display = "block";
        };
        
        // LOGIN
        document.getElementById("loginBtn").onclick = async () => {
            const email = document.getElementById("loginEmail").value.trim();
            const password = document.getElementById("loginPassword").value;
            const errorDiv = document.getElementById("loginError");
            
            if (!email || !password) {
                errorDiv.textContent = "❌ Please enter email and password";
                errorDiv.style.display = "block";
                return;
            }
            
            errorDiv.style.display = "none";
            const btn = document.getElementById("loginBtn");
            btn.innerHTML = "Logging in... <span class='loading'></span>";
            btn.disabled = true;
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = "index.html";
            } catch (error) {
                let message = "❌ Login failed: ";
                if (error.code === 'auth/invalid-credential') {
                    message = "❌ Invalid email or password! Please sign up first.";
                } else if (error.code === 'auth/user-not-found') {
                    message = "❌ User not found! Please sign up.";
                } else {
                    message += error.message;
                }
                errorDiv.textContent = message;
                errorDiv.style.display = "block";
            } finally {
                btn.innerHTML = "Login 🚀";
                btn.disabled = false;
            }
        };
        
        // SIGNUP
        document.getElementById("signupBtn").onclick = async () => {
            const name = document.getElementById("signupName").value.trim();
            const email = document.getElementById("signupEmail").value.trim();
            const password = document.getElementById("signupPassword").value;
            const confirm = document.getElementById("signupConfirmPassword").value;
            const errorDiv = document.getElementById("signupError");
            const successDiv = document.getElementById("signupSuccess");
            
            if (!name || !email || !password) {
                errorDiv.textContent = "❌ Please fill all fields";
                errorDiv.style.display = "block";
                return;
            }
            if (password !== confirm) {
                errorDiv.textContent = "❌ Passwords do not match";
                errorDiv.style.display = "block";
                return;
            }
            if (password.length < 6) {
                errorDiv.textContent = "❌ Password must be at least 6 characters";
                errorDiv.style.display = "block";
                return;
            }
            
            errorDiv.style.display = "none";
            const btn = document.getElementById("signupBtn");
            btn.innerHTML = "Creating account... <span class='loading'></span>";
            btn.disabled = true;
            
            try {
                const userCred = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(userCred.user, { displayName: name });
                await setDoc(doc(db, "users", userCred.user.uid), {
                    name: name, email: email, createdAt: new Date().toISOString(),
                    progress: {
                        english: { basic: false, intermediate: false, advanced: false },
                        spanish: { basic: false, intermediate: false, advanced: false },
                        french: { basic: false, intermediate: false, advanced: false }
                    },
                    totalPoints: 0, quizzesCompleted: 0
                });
                
                successDiv.textContent = "✅ Account created! You can now login.";
                successDiv.style.display = "block";
                
                setTimeout(() => {
                    document.getElementById("signupForm").style.display = "none";
                    document.getElementById("loginForm").style.display = "block";
                    document.getElementById("loginEmail").value = email;
                    successDiv.style.display = "none";
                }, 2000);
            } catch (error) {
                let message = "❌ Signup failed: ";
                if (error.code === 'auth/email-already-in-use') {
                    message = "❌ Email already registered! Please login.";
                } else {
                    message += error.message;
                }
                errorDiv.textContent = message;
                errorDiv.style.display = "block";
            } finally {
                btn.innerHTML = "Create Account ✨";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
